name: untitled5
description: "Dealio - AI-powered shopping assistant for smarter decisions."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.11.1

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  # State Management
  flutter_riverpod: ^2.6.1
  
  # Navigation
  go_router: ^17.2.3
  
  # UI & Design
  google_fonts: ^8.1.0
  flutter_animate: ^4.5.2
  iconsax: ^0.0.1
  
  # Networking & Data
  dio: ^5.7.0
  json_annotation: ^4.12.0
  freezed_annotation: ^3.1.0
  shared_preferences: ^2.5.5
  flutter_secure_storage: ^10.3.0
  
  # Device Features
  image_picker: ^1.2.2
  mobile_scanner: ^7.2.0
  intl: ^0.20.2
  url_launcher: ^6.3.1
  firebase_core: ^4.9.0
  firebase_messaging: ^16.2.2
  flutter_local_notifications: ^21.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  
  # Code Generation
  build_runner: ^2.15.0
  json_serializable: ^6.14.0
  freezed: ^3.2.3
  mockito: ^5.6.4

  # App Icon Generator
  flutter_launcher_icons: ^0.14.4

# Ilova ikonkasi sozlamalari
flutter_launcher_icons:
  android: "launcher_icon"
  ios: true
  image_path: "assets/icons/app_icon.png"
  min_sdk_android: 21

flutter:
  generate: true
  uses-material-design: true
  
  assets:
    - assets/icons/
    - assets/logo/
    - assets/images/
